# Runs the LeetCode live contract suite — TestContract_Live and the
# fake-side TestContract_Fake. The live side authenticates as the
# dedicated test account via repo secrets and submits a fixed passing
# solution to LeetCode's judge each run.
#
# Cookie refresh: when the workflow starts failing with auth errors,
# re-run `go run ./cmd/leetcode-test-login` locally and update the two
# repo secrets. See CLAUDE.md "Live contract test against LeetCode".
name: live-contract

on:
  # Daily check catches LeetCode-side schema drift on weekends and
  # other quiet periods when nobody's pushing. 07:00 UTC = 08:00 CET
  # in winter, so a failure email lands in time for the morning.
  schedule:
    - cron: '0 7 * * *'
  pull_request:
    paths:
      - 'internal/leetcode/**'
      - 'internal/auth/**'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/live-contract.yml'
  push:
    branches: [main]
    paths:
      - 'internal/leetcode/**'
      - 'internal/auth/**'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/live-contract.yml'

# Serialize concurrent triggers — cancelling mid-Submit could leave
# the test account in an odd state, and LeetCode dedupes by code hash
# anyway so two parallel runs would race for the same submission.
concurrency:
  group: live-contract
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run live contract
        env:
          LEETCODE_TEST_SESSION: ${{ secrets.LEETCODE_TEST_SESSION }}
          LEETCODE_TEST_CSRF:    ${{ secrets.LEETCODE_TEST_CSRF }}
        run: go test -v -tags integration ./internal/leetcode/...
